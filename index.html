<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotowettbewerb</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f13;
            --surface-color: #1a1a20;
            --card-bg: #23232c;
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 5rem 2rem 4rem;
            background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.15) 0%, rgba(15, 15, 19, 0) 70%);
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 30px rgba(99, 102, 241, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            max-width: 1200px;
            margin: -2rem auto 0;
            padding: 2rem;
        }

        /* Upload Section */
        .upload-section {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 4rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .upload-section:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .upload-section h2,
        .gallery-section h2 {
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .upload-section h2::before,
        .gallery-section h2::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background-color: var(--primary-color);
            margin-right: 12px;
            border-radius: 4px;
        }

        form {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            form {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .file-upload-group {
                grid-column: span 1;
            }

            .upload-btn {
                grid-column: span 1;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        input[type="text"] {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 1rem 1.2rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all var(--transition);
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            background-color: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .file-upload-group {
            position: relative;
            margin-top: 0.5rem;
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            background-color: var(--card-bg);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
        }

        .file-label::before {
            content: '📁';
            font-size: 2rem;
            margin-right: 1rem;
            opacity: 0.7;
        }

        .file-upload-group:hover .file-label {
            border-color: var(--primary-hover);
            background-color: rgba(99, 102, 241, 0.05);
        }

        #fileName {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .upload-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1.2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            font-weight: 600;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .upload-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        /* Gallery Section */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            background-color: var(--surface-color);
            aspect-ratio: 4/3;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1.5rem 1.5rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            color: white;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .gallery-item:hover .gallery-info {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-info-text {
            flex: 1;
            margin-right: 1rem;
        }

        .gallery-info-text h3 {
            font-size: 1.25rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .actions-container {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            align-items: flex-end;
        }

        /* Voting System (Up/Down) */
        .voting-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .vote-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            padding: 0.2rem;
        }

        .vote-btn:hover {
            color: var(--primary-color);
            transform: scale(1.2);
        }

        .vote-btn:active {
            transform: scale(0.9);
        }

        .vote-btn.voted {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .vote-score {
            font-weight: 600;
            font-size: 1rem;
            min-width: 20px;
            text-align: center;
        }

        /* Voting System (Stars) */
        .star-rating-controls {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .star {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0 0.1rem;
            line-height: 1;
        }

        .star:hover,
        .star:hover ~ .star,
        .star.active,
        .star.active ~ .star {
            color: #f59e0b;
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
        }

        .star:hover {
            transform: scale(1.15);
        }

        .rating-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .rating-number {
            font-weight: 600;
            color: #f59e0b;
        }

        .top-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gallery-item.top-photo {
            grid-column: span 1;
        }

        @media (min-width: 768px) {
            .gallery-item.top-photo {
                grid-column: span 2;
                grid-row: span 2;
            }
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            transition: all var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .gallery-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 1);
            transform: scale(1.1);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        #lightbox-caption {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-color);
            font-size: 1.3rem;
            max-width: 800px;
            padding: 0 20px;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: var(--text-muted);
            font-size: 40px;
            font-weight: 300;
            transition: all var(--transition);
            cursor: pointer;
            z-index: 1010;
            line-height: 1;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .close:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Foto-Wettbewerb</div>
        <p>Lade dein bestes Bild hoch, bewerte andere und finde das Top-Bild der Klasse!</p>
    </header>

    <main>
        <section class="upload-section">
            <h2>Neues Foto hochladen</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="photoTitle">Titel des Fotos</label>
                    <input type="text" id="photoTitle" name="photoTitle" required
                        placeholder="Gib dem Foto einen Titel">
                </div>
                <div class="form-group file-upload-group">
                    <label for="photoFile" class="file-label">
                        <span id="fileName">Klicke hier, um ein Bild auszuwählen...</span>
                    </label>
                    <input type="file" id="photoFile" name="photoFile" accept="image/*" required>
                </div>
                <button type="submit" class="upload-btn">Hochladen</button>
            </form>
        </section>

        <section class="gallery-section">
            <h2>Galerie</h2>
            <div class="gallery" id="gallery">
                <!-- Gallery items will appear here -->
            </div>
        </section>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="lightbox-caption"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqCw09lS-gbkdd00kYxaKE8NAd3rcomRo",
            authDomain: "foto-wettbewerb.firebaseapp.com",
            databaseURL: "https://foto-wettbewerb-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foto-wettbewerb",
            storageBucket: "foto-wettbewerb.firebasestorage.app",
            messagingSenderId: "392527772962",
            appId: "1:392527772962:web:14a5b8d3a8db9caa67b97b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.addEventListener('DOMContentLoaded', () => {
            const uploadForm = document.getElementById('uploadForm');
            const photoFile = document.getElementById('photoFile');
            const fileNameSpan = document.getElementById('fileName');
            const gallery = document.getElementById('gallery');

            // Lightbox elements
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');
            const closeBtn = document.getElementsByClassName('close')[0];

            let photos = [];

            // Speichern für beide Systeme
            let userVotes = JSON.parse(localStorage.getItem('competitionVotes')) || {};
            let userStarVotes = JSON.parse(localStorage.getItem('competitionStarVotes')) || {};

            // Fotos in Echtzeit aus Firebase laden!
            const photosRef = ref(db, 'photos');
            onValue(photosRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    photos = Object.values(data);
                } else {
                    photos = [];
                }
                renderGallery();
            });

            // Delete Funktion
            window.deletePhoto = function(event, id) {
                event.stopPropagation();
                if (confirm('Möchtest du dieses Bild wirklich löschen?')) {
                    remove(ref(db, 'photos/' + id));
                    delete userVotes[id];
                    delete userStarVotes[id];
                    localStorage.setItem('competitionVotes', JSON.stringify(userVotes));
                    localStorage.setItem('competitionStarVotes', JSON.stringify(userStarVotes));
                }
            };

            // Altes Voting-System (Pfeile)
            window.votePhoto = function (event, id, value) {
                event.stopPropagation();
                const photo = photos.find(p => p.id === id);
                if (photo) {
                    const currentVote = userVotes[id] || 0;

                    if (currentVote === value) {
                        photo.score -= value;
                        userVotes[id] = 0;
                    } else {
                        photo.score -= currentVote;
                        photo.score += value;
                        userVotes[id] = value;
                    }
                    
                    localStorage.setItem('competitionVotes', JSON.stringify(userVotes));
                    set(ref(db, 'photos/' + id), photo);
                }
            };

            // Neues Sterne Voting-System
            window.ratePhoto = function (event, id, value) {
                event.stopPropagation();
                const photo = photos.find(p => p.id === id);
                if (photo) {
                    const currentStarVote = userStarVotes[id] || 0;
                    
                    if (photo.voteCount === undefined) photo.voteCount = 0;
                    if (photo.totalStars === undefined) photo.totalStars = 0;

                    if (currentStarVote > 0) {
                        photo.totalStars -= currentStarVote;
                        photo.voteCount -= 1;
                    }

                    if (currentStarVote === value) {
                        userStarVotes[id] = 0;
                    } else {
                        photo.totalStars += value;
                        photo.voteCount += 1;
                        userStarVotes[id] = value;
                    }
                    
                    localStorage.setItem('competitionStarVotes', JSON.stringify(userStarVotes));
                    set(ref(db, 'photos/' + id), photo);
                }
            };

            // Show filename when file selected
            photoFile.addEventListener('change', function (e) {
                if (this.files && this.files.length > 0) {
                    fileNameSpan.textContent = this.files[0].name;
                    fileNameSpan.style.color = 'var(--text-color)';
                    document.querySelector('.file-label').style.borderColor = 'var(--primary-color)';
                    document.querySelector('.file-label').style.backgroundColor = 'rgba(99, 102, 241, 0.05)';
                } else {
                    fileNameSpan.textContent = 'Klicke hier, um ein Bild auszuwählen...';
                    fileNameSpan.style.color = 'var(--text-muted)';
                    document.querySelector('.file-label').style.borderColor = 'rgba(255, 255, 255, 0.15)';
                    document.querySelector('.file-label').style.backgroundColor = 'var(--card-bg)';
                }
            });

            // Handle form submission
            uploadForm.addEventListener('submit', function (e) {
                e.preventDefault();

                const photoTitle = document.getElementById('photoTitle').value;
                const file = photoFile.files[0];

                if (file) {
                    const submitBtn = uploadForm.querySelector('.upload-btn');
                    const originalBtnText = submitBtn.textContent;
                    submitBtn.textContent = 'Bild wird verarbeitet...';
                    submitBtn.disabled = true;

                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            
                            const MAX_WIDTH = 1200;
                            const MAX_HEIGHT = 1200;
                            
                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            
                            const photoId = Date.now();
                            const newPhoto = {
                                id: photoId,
                                url: compressedDataUrl,
                                title: photoTitle,
                                score: 0,
                                totalStars: 0,
                                voteCount: 0
                            };

                            set(ref(db, 'photos/' + photoId), newPhoto)
                                .then(() => {
                                    uploadForm.reset();
                                    fileNameSpan.textContent = 'Klicke hier, um ein Bild auszuwählen...';
                                    fileNameSpan.style.color = 'var(--text-muted)';
                                    document.querySelector('.file-label').style.borderColor = 'rgba(255, 255, 255, 0.15)';
                                    document.querySelector('.file-label').style.backgroundColor = 'var(--card-bg)';
                                    submitBtn.textContent = originalBtnText;
                                    submitBtn.disabled = false;
                                })
                                .catch((error) => {
                                    alert('Es gab einen Fehler beim Hochladen: ' + error.message);
                                    submitBtn.textContent = originalBtnText;
                                    submitBtn.disabled = false;
                                });
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            function renderGallery() {
                gallery.innerHTML = '';

                if (photos.length === 0) {
                    const emptyMsg = document.createElement('p');
                    emptyMsg.style.color = 'var(--text-muted)';
                    emptyMsg.style.gridColumn = '1 / -1';
                    emptyMsg.style.textAlign = 'center';
                    emptyMsg.style.padding = '3rem';
                    emptyMsg.style.fontSize = '1.1rem';
                    emptyMsg.textContent = 'Noch keine Fotos hochgeladen. Sei der oder die Erste!';
                    gallery.appendChild(emptyMsg);
                    return;
                }

                // Sortierung: 1. Stern-Durchschnitt, 2. Alter Score (Pfeile), 3. Anzahl Bewertungen
                photos.sort((a, b) => {
                    let avgA = a.voteCount > 0 ? (a.totalStars / a.voteCount) : 0;
                    let avgB = b.voteCount > 0 ? (b.totalStars / b.voteCount) : 0;
                    
                    if (avgB !== avgA) return avgB - avgA;
                    if ((b.score || 0) !== (a.score || 0)) return (b.score || 0) - (a.score || 0);
                    return (b.voteCount || 0) - (a.voteCount || 0);
                });

                photos.forEach((photo, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';

                    let voteCount = photo.voteCount || 0;
                    let totalStars = photo.totalStars || 0;
                    let avgRating = voteCount > 0 ? (totalStars / voteCount).toFixed(1) : "0.0";

                    const isTopPhoto = index === 0 && (voteCount > 0 || photo.score > 0);
                    if (isTopPhoto) {
                        item.classList.add('top-photo');
                    }

                    const delay = Math.min(index * 0.1, 0.5);
                    item.style.animationDelay = `${delay}s`;

                    const badgeHtml = isTopPhoto ? `<div class="top-badge">🏆 Top Bild</div>` : '';

                    item.innerHTML = `
                ${badgeHtml}
                <button class="delete-btn" onclick="deletePhoto(event, ${photo.id})" title="Bild löschen">🗑️</button>
                <img src="${photo.url}" alt="${photo.title}" loading="lazy">
                <div class="gallery-info">
                    <div class="gallery-info-text">
                        <h3>${photo.title}</h3>
                        <div class="rating-display">
                            <span class="rating-number">⭐ ${avgRating}</span>
                            <span class="rating-count">(${voteCount})</span>
                        </div>
                    </div>
                    
                    <div class="actions-container">
                        <div class="star-rating-controls">
                            ${[5, 4, 3, 2, 1].map(star => `
                                <span class="star ${userStarVotes[photo.id] === star ? 'active' : ''}" 
                                      onclick="ratePhoto(event, ${photo.id}, ${star})" title="${star} Sterne">★</span>
                            `).join('')}
                        </div>
                        <div class="voting-controls">
                            <button class="vote-btn ${userVotes[photo.id] === 1 ? 'voted' : ''}" onclick="votePhoto(event, ${photo.id}, 1)" title="Gefällt mir">▲</button>
                            <span class="vote-score">${photo.score || 0}</span>
                            <button class="vote-btn ${userVotes[photo.id] === -1 ? 'voted' : ''}" onclick="votePhoto(event, ${photo.id}, -1)" title="Gefällt mir nicht">▼</button>
                        </div>
                    </div>
                </div>
            `;

                    item.addEventListener('click', () => openLightbox(photo));
                    gallery.appendChild(item);
                });
            }

            // Lightbox handling
            function openLightbox(photo) {
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';

                setTimeout(() => {
                    lightboxImg.src = photo.url;
                    lightboxImg.alt = photo.title;
                    lightboxCaption.innerHTML = `<strong>${photo.title}</strong>`;
                }, 50);
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => {
                    if (!lightbox.classList.contains('active')) {
                        lightboxImg.src = '';
                    }
                }, 300);
            }

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox(); });

            renderGallery();
        });
    </script>
</body>

</html>
